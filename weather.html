<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard 🌤️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .search-box input {
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            width: 300px;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            transform: scale(1.02);
        }

        .search-box button {
            padding: 12px 30px;
            background: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            animation: slideUp 0.5s ease;
            transition: transform 0.3s ease;
        }

        .weather-card:hover {
            transform: translateY(-5px);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .weather-card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .weather-icon {
            font-size: 4rem;
        }

        .weather-temp {
            font-size: 2.5rem;
            font-weight: 700;
            color: #333;
        }

        .weather-desc {
            color: #666;
            font-size: 1.1rem;
            text-transform: capitalize;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .detail-value {
            color: #333;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: rgba(255, 107, 107, 0.9);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin: 20px 0;
        }

        .forecast-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .forecast-section h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .forecast-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .forecast-card:hover {
            transform: scale(1.05);
        }

        .forecast-time {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .forecast-icon {
            font-size: 2.5rem;
            margin: 10px 0;
        }

        .forecast-temp {
            font-size: 1.1rem;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .search-box input {
                width: 100%;
                max-width: 250px;
            }

            .weather-grid {
                grid-template-columns: 1fr;
            }

            .weather-main {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <p>ตรวจสอบสภาพอากาศแบบ Real-time ทั่วโลก</p>
        </header>

        <div class="search-box">
            <input type="text" id="cityInput" placeholder="ค้นหาเมืองที่ต้องการ..." value="Bangkok">
            <button onclick="searchWeather()">ค้นหา</button>
        </div>

        <div id="weatherContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>กำลังดึงข้อมูลสภาพอากาศ...</p>
            </div>
        </div>

        <div id="forecastContainer"></div>
    </div>

    <script>
        const API_KEY = '85a4e3c55f8d4c9e4b5c7d8f9a0b1c2d'; // OpenWeatherMap API Key
        const BASE_URL = 'https://api.openweathermap.org/data/2.5';

        // Emoji mapping สำหรับประเภทสภาพอากาศ
        const weatherEmojis = {
            'Clear': '☀️',
            'Clouds': '☁️',
            'Rain': '🌧️',
            'Drizzle': '🌦️',
            'Thunderstorm': '⛈️',
            'Snow': '❄️',
            'Mist': '🌫️',
            'Smoke': '💨',
            'Haze': '🌫️',
            'Dust': '🌪️',
            'Fog': '🌫️',
            'Sand': '🌪️',
            'Ash': '🌋',
            'Squall': '💨',
            'Tornado': '🌪️'
        };

        async function searchWeather() {
            const city = document.getElementById('cityInput').value;
            if (!city) {
                alert('กรุณากรอกชื่อเมือง');
                return;
            }

            try {
                document.getElementById('weatherContainer').innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>กำลังดึงข้อมูลสภาพอากาศ...</p>
                    </div>
                `;

                // ดึงข้อมูลสภาพอากาศปัจจุบัน
                const weatherResponse = await fetch(`${BASE_URL}/weather?q=${city}&units=metric&appid=${API_KEY}`);
                if (!weatherResponse.ok) {
                    throw new Error('เมืองไม่พบ');
                }
                const weatherData = await weatherResponse.json();

                // ดึงข้อมูลการพยากรณ์
                const forecastResponse = await fetch(`${BASE_URL}/forecast?q=${city}&units=metric&appid=${API_KEY}`);
                const forecastData = await forecastResponse.json();

                displayWeather(weatherData);
                displayForecast(forecastData);
            } catch (error) {
                document.getElementById('weatherContainer').innerHTML = `
                    <div class="error">
                        ⚠️ ${error.message}
                    </div>
                `;
                document.getElementById('forecastContainer').innerHTML = '';
            }
        }

        function displayWeather(data) {
            const { name, sys, main, weather, wind, clouds, visibility } = data;
            const emoji = weatherEmojis[weather[0].main] || '🌍';

            const html = `
                <div class="weather-grid">
                    <div class="weather-card">
                        <h2>${name}, ${sys.country}</h2>
                        <div class="weather-main">
                            <div class="weather-icon">${emoji}</div>
                            <div>
                                <div class="weather-temp">${Math.round(main.temp)}°C</div>
                                <div class="weather-desc">${weather[0].description}</div>
                            </div>
                        </div>
                        <div class="weather-details">
                            <div class="detail-item">
                                <span class="detail-label">ความรู้สึก</span>
                                <span class="detail-value">${Math.round(main.feels_like)}°C</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">ความชื้น</span>
                                <span class="detail-value">${main.humidity}%</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">ความดัน</span>
                                <span class="detail-value">${main.pressure} hPa</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">ความเร็วลม</span>
                                <span class="detail-value">${wind.speed} m/s</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">มองเห็นไกล</span>
                                <span class="detail-value">${(visibility / 1000).toFixed(1)} km</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">ปกคลุมเมฆ</span>
                                <span class="detail-value">${clouds.all}%</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('weatherContainer').innerHTML = html;
        }

        function displayForecast(data) {
            const forecasts = data.list.filter((item, index) => index % 8 === 0).slice(0, 5);
            
            let html = '<div class="forecast-section"><h3>📅 การพยากรณ์ 5 วัน</h3><div class="forecast-grid">';
            
            forecasts.forEach(forecast => {
                const date = new Date(forecast.dt * 1000);
                const emoji = weatherEmojis[forecast.weather[0].main] || '🌍';
                const dateStr = date.toLocaleDateString('th-TH', { weekday: 'short', month: 'short', day: 'numeric' });
                
                html += `
                    <div class="forecast-card">
                        <div class="forecast-time">${dateStr}</div>
                        <div class="forecast-icon">${emoji}</div>
                        <div class="forecast-temp">${Math.round(forecast.main.temp)}°C</div>
                    </div>
                `;
            });
            
            html += '</div></div>';
            document.getElementById('forecastContainer').innerHTML = html;
        }

        // โหลดข้อมูลเมื่อเปิดหน้า
        window.addEventListener('load', searchWeather);

        // ค้นหาเมื่อกด Enter
        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchWeather();
        });
    </script>
</body>
</html>
